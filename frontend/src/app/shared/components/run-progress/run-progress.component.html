<div class="run-stepper" [class.errored]="isFailed()" [class.completed]="isDone()">

  <!-- ─── Step 1: Einlesen ─── -->
  <div class="step" [class.active]="ingestActive()" [class.done]="!ingestActive() && !isFailed()">
    <div class="step-head">
      <span class="step-num" aria-hidden="true">
        <svg *ngIf="!ingestActive() && !isFailed()" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        <span *ngIf="ingestActive() || isFailed()">1</span>
      </span>
      <span class="step-label">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5M12 3v12"/>
        </svg>
        Einlesen
      </span>
      <span class="step-detail">{{ ingestDetail() }}</span>
    </div>
    <div class="bar" [class.indeterminate]="ingestActive()">
      <div class="bar-fill" [style.width.%]="ingestPercent()"></div>
    </div>
  </div>

  <!-- ─── Step 2: Generieren ─── -->
  <div class="step"
       [class.active]="generateActive()"
       [class.done]="isDone()"
       [class.pending]="ingestActive()">
    <div class="step-head">
      <span class="step-num" aria-hidden="true">
        <svg *ngIf="isDone()" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        <span *ngIf="!isDone()">2</span>
      </span>
      <span class="step-label">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3z"/>
        </svg>
        Generieren
      </span>
      <span class="step-detail">{{ generateDetail() }}</span>
    </div>
    <div class="bar">
      <div class="bar-fill" [style.width.%]="generatePercent()"></div>
    </div>
  </div>

  <!-- ─── Result ─── -->
  <div class="finish" *ngIf="isDone()">
    <span class="finish-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </span>
    <span>Erfolgreich abgeschlossen</span>
  </div>
  <div class="finish failed" *ngIf="isFailed()">
    <span class="finish-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </span>
    <span>Fehler beim Lauf</span>
  </div>
</div>
