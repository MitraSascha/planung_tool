<section class="view reports-view">
  <div class="panel reports-panel">
    <div class="panel-head">
      <div class="reports-panel__title">
        <span class="reports-panel__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
          </svg>
        </span>
        <div>
          <p class="panel-kicker">Projekt {{ slug }}</p>
          <h2>Berichte</h2>
        </div>
      </div>
      <a class="btn btn--secondary btn--sm" [routerLink]="['/projects', slug]">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        Zurück zum Projekt
      </a>
    </div>

    <nav class="sub-tabs">
      <a [routerLink]="['/projects', slug, 'reports', 'daily']" routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Tagesberichte
      </a>
      <a [routerLink]="['/projects', slug, 'reports', 'weekly']" routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg>
        Wochenberichte
      </a>
    </nav>

    <router-outlet></router-outlet>
  </div>
</section>
