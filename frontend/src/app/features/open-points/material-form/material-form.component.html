<section class="view">
  <form class="panel form-panel" (ngSubmit)="submit()">
    <div class="panel-head">
      <div>
        <p class="panel-kicker">Projekt {{ slug }}</p>
        <h2>Neue Materialmeldung</h2>
      </div>
      <div class="button-row">
        <a class="button-link secondary" [routerLink]="['/projects', slug, 'open-points']">Abbrechen</a>
        <button type="submit" [disabled]="submitting()">Speichern</button>
      </div>
    </div>

    <div class="status-row">
      <span class="panel-kicker">Prioritaet</span>
      <div class="pill-row">
        <button type="button" class="pill-toggle green" [class.active]="form.priority === 'low'" (click)="setPriority('low')">Niedrig</button>
        <button type="button" class="pill-toggle brand" [class.active]="form.priority === 'normal'" (click)="setPriority('normal')">Normal</button>
        <button type="button" class="pill-toggle yellow" [class.active]="form.priority === 'high'" (click)="setPriority('high')">Hoch</button>
        <button type="button" class="pill-toggle red" [class.active]="form.priority === 'urgent'" (click)="setPriority('urgent')">Dringend</button>
      </div>
    </div>

    <div class="form-grid">
      <label>Bauabschnitt
        <select name="section_number" [(ngModel)]="form.section_number">
          <option [ngValue]="null">— kein Abschnitt —</option>
          <option *ngFor="let section of project()?.sections ?? []" [ngValue]="section.number">
            Abschnitt {{ section.number }} &middot; {{ section.name }}
          </option>
        </select>
      </label>
      <label class="wide">Beschreibung
        <textarea name="description" rows="4" [(ngModel)]="form.description" required placeholder="Was fehlt, wo und fuer welche Arbeit?"></textarea>
      </label>
    </div>
  </form>
</section>
