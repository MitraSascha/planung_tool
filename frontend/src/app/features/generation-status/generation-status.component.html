<section class="view generation-view" *ngIf="project() as p">
  <div class="panel generation-panel"
       [class.generation-panel--ready]="p.ready_for_generation"
       [class.generation-panel--published]="p.status === 'published'"
       [class.generation-panel--failed]="p.status.includes('failed')">
    <div class="panel-head">
      <div class="generation-panel__title">
        <span class="generation-panel__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3z"/>
          </svg>
        </span>
        <div>
          <p class="panel-kicker">Generator</p>
          <h2>{{ p.name }} <small class="slug-tag">{{ p.slug }}</small></h2>
        </div>
      </div>
      <span class="badge"
            [class.badge--ok]="p.status === 'published'"
            [class.badge--err]="p.status.includes('failed')"
            [class.badge--info]="p.status !== 'published' && !p.status.includes('failed')">
        {{ statusLabel(p.status) }}
      </span>
    </div>

    <div class="planned-output">
      <strong>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        Geplante Ausgabe ({{ p.planned_outputs.length }})
      </strong>
      <div class="output-chips">
        <span *ngFor="let output of p.planned_outputs" class="output-chip">{{ output }}</span>
      </div>
    </div>

    <div class="readiness" [class.ready]="p.ready_for_generation">
      <div class="readiness__icon" aria-hidden="true">
        <svg *ngIf="p.ready_for_generation" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        <svg *ngIf="!p.ready_for_generation" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      </div>
      <div class="readiness__body">
        <strong>{{ p.ready_for_generation ? 'Bereit für Generatorlauf' : 'Vor Generatorlauf prüfen' }}</strong>
        <ul *ngIf="!p.ready_for_generation">
          <li *ngFor="let issue of p.readiness_issues">{{ issue }}</li>
        </ul>
      </div>
    </div>

    <div class="button-row">
      <button type="button" class="btn btn--secondary" (click)="runDryGenerate()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Dry-Run
      </button>
      <button type="button" class="btn btn--primary"
              [disabled]="!p.ready_for_generation || isGenerating()"
              (click)="runGenerate()">
        <svg *ngIf="!isGenerating()" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg *ngIf="isGenerating()" class="spin" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        {{ isGenerating() ? 'Wird erzeugt…' : 'Dokumente erzeugen' }}
      </button>
    </div>

    <app-run-progress *ngIf="currentRun() as run" [run]="run"></app-run-progress>
  </div>
</section>

<section class="view" *ngIf="!project()">
  <div class="panel loading-panel">
    <div class="loading-spinner" aria-hidden="true">
      <svg class="spin" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </div>
    <p>Projekt wird geladen…</p>
  </div>
</section>
