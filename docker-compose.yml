services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./storage:/storage
      - ./project_docu:/reference_schema:ro
      - ${HOME}/.codex:/home/appuser/.codex
      - ${HOME}/.claude:/home/appuser/.claude
      - ${HOME}/.claude.json:/home/appuser/.claude.json
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage/projects:/storage/projects:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hez_tool}
      POSTGRES_USER: ${POSTGRES_USER:-hez}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hez_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hez} -d ${POSTGRES_DB:-hez_tool}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
