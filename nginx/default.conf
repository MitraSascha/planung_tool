server {
    listen 80;
    server_name hez.tech-artist.de;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name ~^(?<project_slug>[a-z0-9-]+)\.hez\.tech-artist\.de$;

    root /storage/projects/$project_slug;
    index 99_HTML_Uebersicht/index.html index.html;

    location / {
        try_files $uri $uri/ /99_HTML_Uebersicht/index.html =404;
    }
}

# Local-only preview of published project outputs without API auth.
# Active solely when the request arrives with Host: localhost (or 127.0.0.1)
# — production traffic uses hez.tech-artist.de / <slug>.hez.tech-artist.de,
# so this block is dormant on the live machine.
# Open e.g. http://localhost/preview/hez-640/00_Start/index.html
server {
    # default_server: fängt alle Hosts, die nicht zu hez.tech-artist.de
    # oder einer Projekt-Subdomain passen. Damit erreichbar via:
    #   - http://localhost          (Browser auf dem Rechner)
    #   - http://192.168.x.x        (Handy/Tablet im selben WLAN)
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;

    location /preview/ {
        alias /storage/projects/;
        try_files $uri $uri/00_Start/index.html $uri/index.html =404;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
